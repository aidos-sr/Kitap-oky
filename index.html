<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кітап Оқу Бақылауышы</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #0f1117;
    --card: #1a1d2e;
    --card2: #222537;
    --accent: #f5a623;
    --accent2: #e8533f;
    --green: #4ade80;
    --text: #eef0f7;
    --muted: #7b7f9a;
    --border: rgba(245,166,35,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(245,166,35,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 80%, rgba(232,83,63,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; padding: 20px 16px 60px; }

  /* HEADER */
  header {
    text-align: center;
    padding: 28px 0 20px;
  }
  header .logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  header .logo span { color: var(--text); }
  header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* STATS BAR */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
  }
  .stat-card .num {
    font-size: 32px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  .stat-card .lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* SCAN BUTTON */
  .scan-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 18px;
    padding: 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 32px rgba(245,166,35,0.25);
    margin-bottom: 24px;
  }
  .scan-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(245,166,35,0.35); }
  .scan-btn:active { transform: scale(0.98); }
  .scan-btn svg { width: 22px; height: 22px; }

  /* SCANNER MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--card);
    border-radius: 24px;
    padding: 24px;
    width: 90%;
    max-width: 420px;
    border: 1px solid var(--border);
    animation: popIn 0.25s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  #scanner-container {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 1;
  }
  #scanner-video { width: 100%; display: block; }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 60%;
    aspect-ratio: 1;
    border: 3px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    position: relative;
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanLine 2s linear infinite;
    top: 0;
  }
  @keyframes scanLine {
    0% { top: 0; opacity: 1; }
    100% { top: 100%; opacity: 0.3; }
  }
  .scan-hint {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-top: 12px;
  }
  /* Upload QR button */
  .upload-qr-btn {
    width: 100%;
    margin-top: 12px;
    background: var(--card2);
    border: 2px dashed var(--accent);
    border-radius: 14px;
    padding: 13px;
    color: var(--accent);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .upload-qr-btn:hover { background: rgba(245,166,35,0.1); }
  /* Manual input */
  .manual-section {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }
  .manual-input {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .manual-input::placeholder { color: var(--muted); }
  .manual-input:focus { border-color: var(--accent); }
  .manual-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 10px 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
  }

  /* BOOK CARD */
  .book-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    display: none;
    animation: fadeUp 0.35s ease;
  }
  .book-card.visible { display: block; }
  @keyframes fadeUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .book-emoji { font-size: 48px; margin-bottom: 12px; }
  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .book-author {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .submit-btn {
    width: 100%;
    background: var(--card2);
    color: var(--text);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }
  .submit-btn:hover { background: rgba(245,166,35,0.12); transform: translateY(-1px); }

  /* QUIZ */
  .quiz-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    display: none;
    animation: fadeUp 0.35s ease;
  }
  .quiz-section.visible { display: block; }
  .quiz-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .quiz-progress {
    flex: 1;
    height: 6px;
    background: var(--card2);
    border-radius: 99px;
    overflow: hidden;
  }
  .quiz-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .quiz-count {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    white-space: nowrap;
  }
  .question-text {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 18px;
    line-height: 1.4;
    min-height: 60px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--card2);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    position: relative;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); transform: translateX(4px); }
  .option-btn.correct { border-color: var(--green); background: rgba(74,222,128,0.1); }
  .option-btn.wrong { border-color: var(--accent2); background: rgba(232,83,63,0.1); }
  .option-btn:disabled { cursor: default; }
  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.25); }
  .feedback.fail { background: rgba(232,83,63,0.12); color: #f87171; border: 1px solid rgba(232,83,63,0.25); }
  .next-btn {
    width: 100%;
    margin-top: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: none;
  }
  .next-btn.show { display: block; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px 20px;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 14px; }

  /* RESULT */
  .result-section {
    background: var(--card);
    border: 2px solid var(--green);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    display: none;
    animation: fadeUp 0.35s ease;
    margin-bottom: 24px;
  }
  .result-section.visible { display: block; }
  .result-emoji { font-size: 56px; margin-bottom: 12px; }
  .result-score {
    font-size: 42px;
    font-weight: 900;
    color: var(--accent);
  }
  .result-text { color: var(--muted); font-size: 14px; margin: 8px 0 20px; }
  .done-btn {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 14px 32px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }

  /* BOOK LIST */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .book-list { display: flex; flex-direction: column; gap: 10px; }
  .book-list-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.3s ease;
  }
  .book-list-item .bk-emoji { font-size: 28px; }
  .book-list-item .bk-info { flex: 1; }
  .book-list-item .bk-name { font-weight: 700; font-size: 14px; }
  .book-list-item .bk-score { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .book-list-item .bk-badge {
    font-size: 11px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 99px;
    background: rgba(74,222,128,0.15);
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.3);
  }
  .empty-state {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .big { font-size: 40px; margin-bottom: 10px; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px 0 8px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  .footer span { color: var(--accent); font-weight: 700; }

  /* Responsive */
  @media (max-width: 360px) {
    .book-title { font-size: 18px; }
    .stat-card .num { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">📚 Кітап<span>Оқу</span></div>
    <p>QR кодты сканерлеп, кітапты тапсыр!</p>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="total-count">0</div>
      <div class="lbl">Оқылған кітап</div>
    </div>
    <div class="stat-card">
      <div class="num" id="avg-score">—</div>
      <div class="lbl">Орт. нәтиже</div>
    </div>
  </div>

  <!-- Scan Button -->
  <button class="scan-btn" onclick="openScanner()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="5" height="5" rx="1"/>
      <rect x="16" y="3" width="5" height="5" rx="1"/>
      <rect x="3" y="16" width="5" height="5" rx="1"/>
      <path d="M21 16h-3v3M21 21v-1M13 3v5h5M13 13h2v2h-2zM13 19h2M17 13v2h2"/>
    </svg>
    QR Кодты Сканерлеу
  </button>

  <!-- Book Card -->
  <div class="book-card" id="book-card">
    <div class="book-emoji" id="book-emoji">📖</div>
    <div class="book-title" id="book-title"></div>
    <div class="book-author" id="book-author"></div>
    <button class="submit-btn" onclick="startQuiz()">Тапсыру →</button>
  </div>

  <!-- Quiz Section -->
  <div class="quiz-section" id="quiz-section">
    <div class="quiz-header">
      <div class="quiz-progress"><div class="quiz-progress-bar" id="progress-bar" style="width:0%"></div></div>
      <div class="quiz-count" id="quiz-count">1/5</div>
    </div>
    <div id="quiz-content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Сұрақтар дайындалуда...</p>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-section" id="result-section">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-score" id="result-score"></div>
    <div class="result-text" id="result-text"></div>
    <button class="done-btn" onclick="finishAndReset()">Жарайды!</button>
  </div>

  <!-- Book History -->
  <div class="section-title">Оқылған кітаптар</div>
  <div class="book-list" id="book-list">
    <div class="empty-state">
      <div class="big">📭</div>
      Әлі бірде-бір кітап тапсырылмаған
    </div>
  </div>

</div>

<!-- Scanner Modal -->
<div class="modal-overlay" id="scanner-modal">
  <div class="modal-box">
    <div class="modal-title">
      QR Кодты Оқу
      <button class="modal-close" onclick="closeScanner()">✕</button>
    </div>
    <div id="scanner-container">
      <video id="scanner-video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>
      <div id="camera-error" style="display:none;position:absolute;inset:0;background:#111;display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;padding:20px;text-align:center;">
        <div style="font-size:36px">📷</div>
        <div style="font-size:13px;color:var(--muted)">Камера ашылмады</div>
      </div>
    </div>
    <p class="scan-hint">Камераны QR кодқа тосыңыз</p>
    <!-- Upload QR image -->
    <label class="upload-qr-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      QR суретін жүктеу (галерея)
      <input type="file" accept="image/*" id="qr-upload-input" style="display:none" onchange="handleQRUpload(event)">
    </label>
    <div class="manual-section">
      <input class="manual-input" id="manual-input" type="text" placeholder='Немесе кітап атын жазыңыз...' />
      <button class="manual-btn" onclick="manualEnter()">Кіру</button>
    </div>
  </div>
</div>

<canvas id="qr-canvas" style="display:none"></canvas>

<script>
  // ─── State ───────────────────────────────────────────────────────────
  let readBooks = JSON.parse(localStorage.getItem('readBooks') || '[]');
  let currentBook = null;
  let questions = [];
  let currentQ = 0;
  let score = 0;
  let stream = null;
  let scanInterval = null;

  const EMOJIS = ['📕','📗','📘','📙','📓','📔','📒'];
  function randEmoji() { return EMOJIS[Math.floor(Math.random()*EMOJIS.length)]; }

  // ─── QR Scanner ──────────────────────────────────────────────────────
  function openScanner() {
    document.getElementById('scanner-modal').classList.add('open');
    startCamera();
  }

  async function startCamera() {
    const errEl = document.getElementById('camera-error');
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      const video = document.getElementById('scanner-video');
      video.srcObject = stream;
      video.play();
      scanInterval = setInterval(scanFrame, 300);
    } catch(e) {
      // Show error state, user can still use upload or manual input
      if (errEl) { errEl.style.display = 'flex'; }
    }
  }

  function handleQRUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.getElementById('qr-canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          handleQRCode(code.data);
        } else {
          alert('QR код табылмады. Суретті анығырақ түсіріп көріңіз немесе кітап атын қолмен жазыңыз.');
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    // reset so same file can be uploaded again
    event.target.value = '';
  }

  function scanFrame() {
    const video = document.getElementById('scanner-video');
    const canvas = document.getElementById('qr-canvas');
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if (code && code.data) {
      handleQRCode(code.data);
    }
  }

  function closeScanner() {
    document.getElementById('scanner-modal').classList.remove('open');
    stopCamera();
  }

  function stopCamera() {
    if (scanInterval) clearInterval(scanInterval);
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  function handleQRCode(data) {
    closeScanner();
    // QR data can be "Кітап аты|Автор" or just book name
    let title, author;
    if (data.includes('|')) {
      [title, author] = data.split('|');
    } else {
      title = data;
      author = '';
    }
    showBookCard(title.trim(), author.trim());
  }

  function manualEnter() {
    const val = document.getElementById('manual-input').value.trim();
    if (!val) return;
    document.getElementById('manual-input').value = '';
    closeScanner();
    showBookCard(val, '');
  }

  // ─── Book Card ───────────────────────────────────────────────────────
  function showBookCard(title, author) {
    currentBook = { title, author, emoji: randEmoji() };
    document.getElementById('book-emoji').textContent = currentBook.emoji;
    document.getElementById('book-title').textContent = title;
    document.getElementById('book-author').textContent = author || 'Автор белгісіз';
    document.getElementById('book-card').classList.add('visible');
    document.getElementById('quiz-section').classList.remove('visible');
    document.getElementById('result-section').classList.remove('visible');
    window.scrollTo({ top: document.getElementById('book-card').offsetTop - 20, behavior: 'smooth' });
  }

  // ─── Quiz ────────────────────────────────────────────────────────────
  async function startQuiz() {
    document.getElementById('quiz-section').classList.add('visible');
    document.getElementById('quiz-content').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>AI сұрақтар жасауда...</p>
      </div>`;
    window.scrollTo({ top: document.getElementById('quiz-section').offsetTop - 20, behavior: 'smooth' });

    questions = await generateQuestions(currentBook.title, currentBook.author);
    currentQ = 0;
    score = 0;
    showQuestion();
  }

  async function generateQuestions(bookTitle, bookAuthor) {
    try {
      const prompt = `Сен Қазақстандағы мектеп мұғалімісің. "${bookTitle}"${bookAuthor ? ` (автор: ${bookAuthor})` : ''} кітабы бойынша 5 сұрақ дайырла.

Тек JSON массив қайтар, басқа ештеңе жоқ:
[
  {
    "q": "сұрақ мәтіні",
    "opts": ["A жауап", "B жауап", "C жауап", "D жауап"],
    "ans": 0
  }
]

Ережелер:
- Барлығы қазақ тілінде
- ans - дұрыс жауаптың индексі (0-3)
- Сұрақтар кітаптың мазмұнына, кейіпкерлеріне, тақырыбына байланысты болсын
- Егер кітап белгісіз болса, жалпы мазмұн туралы ойлап тап`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      return JSON.parse(clean);
    } catch(e) {
      // Fallback questions
      return fallbackQuestions(bookTitle);
    }
  }

  function fallbackQuestions(title) {
    return [
      { q: `"${title}" кітабының негізгі тақырыбы не?`, opts: ['Достық', 'Махаббат', 'Ерлік', 'Табиғат'], ans: 2 },
      { q: 'Кітаптың бас кейіпкері кім?', opts: ['Оқушы', 'Ұстаз', 'Батыр', 'Саяхатшы'], ans: 2 },
      { q: 'Кітап қай тілде жазылған?', opts: ['Орысша', 'Қазақша', 'Ағылшынша', 'Өзбекше'], ans: 1 },
      { q: 'Кітаптың соңы қалай аяқталады?', opts: ['Жақсылықпен', 'Жамандықпен', 'Белгісіз', 'Жалғасы бар'], ans: 0 },
      { q: 'Кітаптан не үйрендің?', opts: ['Ештеңе', 'Достықты бағалауды', 'Еңбектің маңызын', 'Табиғатты сүюді'], ans: 2 }
    ];
  }

  function showQuestion() {
    if (currentQ >= questions.length) { showResult(); return; }
    const q = questions[currentQ];
    const pct = (currentQ / questions.length) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('quiz-count').textContent = `${currentQ+1}/${questions.length}`;

    document.getElementById('quiz-content').innerHTML = `
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,i) => `<button class="option-btn" onclick="selectAnswer(${i})">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        ${currentQ+1 < questions.length ? 'Келесі сұрақ →' : 'Нәтижені көру'}
      </button>`;
  }

  function selectAnswer(idx) {
    const q = questions[currentQ];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    const fb = document.getElementById('feedback');
    if (idx === q.ans) {
      score++;
      btns[idx].classList.add('correct');
      fb.className = 'feedback show ok';
      fb.textContent = '✅ Дұрыс жауап!';
    } else {
      btns[idx].classList.add('wrong');
      btns[q.ans].classList.add('correct');
      fb.className = 'feedback show fail';
      fb.textContent = `❌ Дұрыс жауап: "${q.opts[q.ans]}"`;
    }
    document.getElementById('next-btn').classList.add('show');
  }

  function nextQuestion() {
    currentQ++;
    showQuestion();
  }

  function showResult() {
    document.getElementById('progress-bar').style.width = '100%';
    const pct = Math.round((score / questions.length) * 100);
    let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
    let msg = pct >= 80 ? 'Керемет! Кітапты жақсы оқыдың!' :
              pct >= 60 ? 'Жақсы нәтиже! Кітапты оқыдың.' :
                          'Кітапты тағы бір рет оқып шық.';

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-score').textContent = `${score}/${questions.length}`;
    document.getElementById('result-text').textContent = msg;
    document.getElementById('result-section').classList.add('visible');
    document.getElementById('quiz-section').classList.remove('visible');

    // Save
    readBooks.unshift({
      ...currentBook,
      score, total: questions.length,
      date: new Date().toLocaleDateString('kk-KZ')
    });
    localStorage.setItem('readBooks', JSON.stringify(readBooks));
    updateStats();
    renderBookList();
    window.scrollTo({ top: document.getElementById('result-section').offsetTop - 20, behavior: 'smooth' });
  }

  function finishAndReset() {
    document.getElementById('book-card').classList.remove('visible');
    document.getElementById('result-section').classList.remove('visible');
    currentBook = null;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── Stats & List ────────────────────────────────────────────────────
  function updateStats() {
    document.getElementById('total-count').textContent = readBooks.length;
    if (readBooks.length > 0) {
      const avg = Math.round(readBooks.reduce((s,b) => s + (b.score/b.total)*100, 0) / readBooks.length);
      document.getElementById('avg-score').textContent = avg + '%';
    }
  }

  function renderBookList() {
    const el = document.getElementById('book-list');
    if (readBooks.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="big">📭</div>Әлі бірде-бір кітап тапсырылмаған</div>`;
      return;
    }
    el.innerHTML = readBooks.map(b => `
      <div class="book-list-item">
        <span class="bk-emoji">${b.emoji}</span>
        <div class="bk-info">
          <div class="bk-name">${b.title}</div>
          <div class="bk-score">${b.date} · ${b.score}/${b.total} дұрыс</div>
        </div>
        <span class="bk-badge">${Math.round(b.score/b.total*100)}%</span>
      </div>`).join('');
  }

  // ─── Init ─────────────────────────────────────────────────────────────
  updateStats();
  renderBookList();
</script>
