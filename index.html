<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кітап Оқу Бақылауышы</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #0f1117;
    --card: #1a1d2e;
    --card2: #222537;
    --accent: #f5a623;
    --accent2: #e8533f;
    --green: #4ade80;
    --text: #eef0f7;
    --muted: #7b7f9a;
    --border: rgba(245,166,35,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(245,166,35,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 80%, rgba(232,83,63,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* HEADER */
  header { text-align: center; padding: 20px 0 24px; }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  header p { font-size: 13px; color: var(--muted); margin-top: 6px; }

  /* STATS */
  .stats { display: flex; gap: 12px; margin-bottom: 24px; }
  .stat-card {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
  }
  .stat-card .num {
    font-size: 36px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  .stat-card .lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* INPUT CARD */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 20px;
  }
  .input-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .input-row { display: flex; gap: 10px; }
  .book-input {
    flex: 1;
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .book-input::placeholder { color: var(--muted); }
  .book-input:focus { border-color: var(--accent); }
  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 13px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(245,166,35,0.3);
  }
  .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,166,35,0.4); }
  .add-btn:active { transform: scale(0.97); }

  /* BOOK CARD (confirm) */
  .book-card {
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 20px;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .book-card.visible { display: block; }
  @keyframes fadeUp {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .book-card-emoji { font-size: 44px; margin-bottom: 10px; }
  .book-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 18px;
    line-height: 1.3;
  }
  .submit-btn {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .submit-btn:hover { transform: translateY(-2px); opacity: 0.9; }
  .cancel-btn {
    width: 100%;
    margin-top: 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 11px;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  /* SUCCESS */
  .success-toast {
    display: none;
    background: rgba(74,222,128,0.12);
    border: 1px solid rgba(74,222,128,0.35);
    border-radius: 14px;
    padding: 16px 20px;
    text-align: center;
    color: var(--green);
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 20px;
    animation: fadeUp 0.3s ease;
  }
  .success-toast.show { display: block; }

  /* BOOK LIST */
  .section-title {
    font-size: 12px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .book-list { display: flex; flex-direction: column; gap: 10px; }
  .book-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.3s ease;
  }
  .book-item .bi-emoji { font-size: 26px; }
  .book-item .bi-info { flex: 1; min-width: 0; }
  .book-item .bi-name {
    font-weight: 700;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-item .bi-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .book-item .bi-badge {
    font-size: 18px;
    flex-shrink: 0;
  }
  .empty-state {
    text-align: center;
    padding: 36px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .big { font-size: 44px; margin-bottom: 10px; }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 28px 0 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .footer span { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">📚 Кітап<span>Оқу</span></div>
    <p>Оқыған кітабыңды тіркеп отыр!</p>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="total-count">0</div>
      <div class="lbl">Оқылған кітап</div>
    </div>
    <div class="stat-card">
      <div class="num" id="this-month">0</div>
      <div class="lbl">Осы ай</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-card">
    <div class="input-label">📖 Кітаптің атын жазыңыз</div>
    <div class="input-row">
      <input
        class="book-input"
        id="book-input"
        type="text"
        placeholder="Мысалы: Абай жолы..."
        onkeydown="if(event.key==='Enter') showConfirm()"
      />
      <button class="add-btn" onclick="showConfirm()">Кіру</button>
    </div>
  </div>

  <!-- Confirm card -->
  <div class="book-card" id="book-card">
    <div class="book-card-emoji" id="book-emoji">📖</div>
    <div class="book-card-title" id="book-title"></div>
    <button class="submit-btn" onclick="submitBook()">✅ Тапсыру</button>
    <button class="cancel-btn" onclick="cancelBook()">Болдырмау</button>
  </div>

  <!-- Success -->
  <div class="success-toast" id="success-toast">🎉 Кітап тапсырылды!</div>

  <!-- List -->
  <div class="section-title">Оқылған кітаптар тізімі</div>
  <div class="book-list" id="book-list"></div>

  <div class="footer">made by <span>Aidos</span> and <span>Anuar</span></div>

</div>

<script>
  const EMOJIS = ['📕','📗','📘','📙','📓','📔','📒','📖'];
  function randEmoji() { return EMOJIS[Math.floor(Math.random() * EMOJIS.length)]; }

  let books = JSON.parse(localStorage.getItem('books') || '[]');
  let pendingBook = null;

  function showConfirm() {
    const val = document.getElementById('book-input').value.trim();
    if (!val) return;
    pendingBook = { title: val, emoji: randEmoji(), date: new Date().toLocaleDateString('kk-KZ') };
    document.getElementById('book-emoji').textContent = pendingBook.emoji;
    document.getElementById('book-title').textContent = val;
    document.getElementById('book-card').classList.add('visible');
    document.getElementById('success-toast').classList.remove('show');
  }

  function submitBook() {
    if (!pendingBook) return;
    books.unshift(pendingBook);
    localStorage.setItem('books', JSON.stringify(books));
    document.getElementById('book-input').value = '';
    document.getElementById('book-card').classList.remove('visible');
    document.getElementById('success-toast').classList.add('show');
    setTimeout(() => document.getElementById('success-toast').classList.remove('show'), 3000);
    pendingBook = null;
    updateStats();
    renderList();
  }

  function cancelBook() {
    pendingBook = null;
    document.getElementById('book-card').classList.remove('visible');
    document.getElementById('book-input').value = '';
  }

  function updateStats() {
    document.getElementById('total-count').textContent = books.length;
    const now = new Date();
    const thisMonth = books.filter(b => {
      const parts = b.date.split('.');
      if (parts.length < 2) return false;
      return parseInt(parts[1]) === now.getMonth() + 1 &&
             parseInt(parts[2] || now.getFullYear()) === now.getFullYear();
    }).length;
    document.getElementById('this-month').textContent = thisMonth;
  }

  function renderList() {
    const el = document.getElementById('book-list');
    if (books.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="big">📭</div>Әлі бірде-бір кітап тапсырылмаған</div>`;
      return;
    }
    el.innerHTML = books.map(b => `
      <div class="book-item">
        <span class="bi-emoji">${b.emoji}</span>
        <div class="bi-info">
          <div class="bi-name">${b.title}</div>
          <div class="bi-date">${b.date}</div>
        </div>
        <span class="bi-badge">✅</span>
      </div>`).join('');
  }

  updateStats();
  renderList();
</script>
</body>
</html>
